services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: inventario
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: inventario
      MYSQL_PASSWORD: inventario
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: mysql://inventario:inventario@db:3306/inventario
      JWT_SECRET: cambia-este-secreto-en-produccion
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data:
